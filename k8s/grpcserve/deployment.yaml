apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpcserve
  namespace: vote-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpcserve
  template:
    metadata:
      labels:
        app: grpcserve
    spec:
      containers:
        - name: grpcserve
          image: vote-demo/grpcserve:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/etc
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: grpcserve-config
