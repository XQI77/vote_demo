syntax = "proto3";

package vote;

option go_package = "vote-demo/grpcserver/pb";

// ─── 基础数据结构 ───────────────────────────────────────────────

// 单个话题的投票结果
message TopicResult {
  string topic = 1; // 话题名称，如 "Go", "K8s", "AI"
  int64  count = 2; // 当前票数
}

// ─── Vote RPC ──────────────────────────────────────────────────

message VoteRequest {
  string          user_id = 1; // 用户 ID（从 HTTP Header X-User-Id 透传）
  repeated string topics  = 2; // 本次投票的话题列表，可投多个
}

message VoteResponse {
  bool             success = 1; // 是否成功
  string           message = 2; // 错误或提示信息
  repeated TopicResult results = 3; // 投票后的最新结果
}

// ─── Revoke RPC ────────────────────────────────────────────────

message RevokeRequest {
  string          user_id = 1; // 用户 ID
  repeated string topics  = 2; // 要撤销的话题列表，为空则撤销全部
}

message RevokeResponse {
  bool             success = 1;
  string           message = 2;
  repeated TopicResult results = 3; // 撤销后的最新结果
}

// ─── GetResults RPC ────────────────────────────────────────────

message GetResultsRequest {
  // 可选：指定查询哪些话题；为空则返回全部
  repeated string topics = 1;
}

message GetResultsResponse {
  repeated TopicResult results = 1;
}

// ─── GetUserVotes RPC（进阶：查询用户已投话题）────────────────────

message GetUserVotesRequest {
  string user_id = 1;
}

message GetUserVotesResponse {
  repeated string voted_topics = 1; // 该用户已投的话题列表
}

// ─── Service 定义 ──────────────────────────────────────────────

service VoteService {
  // 投票（幂等：同一用户同一话题重复调用不会多计）
  rpc Vote(VoteRequest) returns (VoteResponse);

  // 撤销投票
  rpc Revoke(RevokeRequest) returns (RevokeResponse);

  // 查询所有话题的实时票数
  rpc GetResults(GetResultsRequest) returns (GetResultsResponse);

  // 查询某用户已投的话题（用于前端回显状态）
  rpc GetUserVotes(GetUserVotesRequest) returns (GetUserVotesResponse);
}
